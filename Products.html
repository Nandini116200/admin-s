<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | JFAM Admin</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body data-page="products">
  <div id="adminPageShell"></div>
  <style>
    .products-dashboard {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .products-dashboard .stats-grid {
      grid-template-columns: repeat(auto-fit, minmax(min(230px, 100%), 1fr));
    }

    .products-dashboard .stat-card {
      align-content: start;
      grid-template-rows: auto auto minmax(34px, 1fr) auto;
      min-width: 0;
      overflow: hidden;
    }

    .products-dashboard .stat-heading {
      justify-content: space-between;
      min-width: 0;
    }

    .products-dashboard .stat-heading > span:first-child,
    .products-dashboard .stat-detail,
    .products-dashboard .stat-trend span:last-child,
    .products-dashboard .stats-grid strong {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .products-dashboard .stats-grid strong {
      line-height: 1.08;
      max-width: 100%;
    }

    .products-dashboard .stat-trend {
      flex-wrap: wrap;
      height: auto;
      line-height: 1.2;
      max-width: 100%;
      min-height: 28px;
      padding-bottom: 6px;
      padding-top: 6px;
      white-space: normal;
    }

    .products-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(min(330px, 100%), 1fr));
      min-width: 0;
    }

    .product-card,
    .products-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(87, 51, 26, 0.06);
      display: grid;
      gap: 16px;
      min-width: 0;
      padding: 20px;
    }

    .product-card-head {
      align-items: start;
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(0, 1fr) auto;
      min-width: 0;
    }

    .product-card h2,
    .products-panel h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      line-height: 1.15;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .product-card-meta,
    .product-stock-row {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .product-stock-row {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      min-width: 0;
    }

    .product-stock-row strong {
      color: var(--ink);
      font-size: 16px;
      white-space: nowrap;
    }

    .product-stock-track {
      background: #f2d9ce;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }

    .product-stock-fill {
      background: #cf6540;
      border-radius: inherit;
      display: block;
      height: 100%;
      width: var(--stock-width, 0%);
    }

    .product-mini-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      min-width: 0;
    }

    .product-mini {
      background: #f5efe6;
      border-radius: 12px;
      display: grid;
      gap: 5px;
      min-width: 0;
      padding: 12px;
      text-align: center;
    }

    .product-mini span {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .product-mini strong {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .products-table-wrap {
      min-width: 0;
      overflow-x: auto;
    }

    .products-table {
      border-collapse: collapse;
      min-width: 820px;
      width: 100%;
    }

    .products-table th,
    .products-table td {
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
    }

    .products-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .products-table td {
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .products-table td:nth-child(3),
    .products-table td:nth-child(4),
    .products-table td:nth-child(5),
    .products-table td:nth-child(6) {
      text-align: right;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./Supabase.js"></script>
  <script src="./admin-pages.js"></script>
  <script src="./products-page.js"></script>
</body>
</html>
