<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JFAM Admin Orders</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <main class="admin-shell">
    <section class="admin-login" id="adminLoginPanel">
      <div>
        <p class="eyebrow">Admin access</p>
        <h1 id="adminLoginTitle">JFAM Orders</h1>
        <p class="muted" id="adminLoginCopy">Sign in with the admin email that is added in Supabase.</p>
      </div>
      <form id="adminLoginForm" class="admin-login-form">
        <input type="email" id="adminEmailInput" placeholder="Admin email" autocomplete="email" required>
        <button type="submit">Send OTP</button>
      </form>
      <form id="adminOtpForm" class="admin-login-form hidden">
        <p class="otp-email" id="adminOtpEmail"></p>
        <div class="otp-grid" aria-label="Enter 6 digit OTP">
          <input class="otp-digit" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="OTP digit 1">
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 2">
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 3">
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 4">
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 5">
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 6">
        </div>
        <input type="hidden" id="adminOtpInput">
        <button type="submit">Verify OTP</button>
        <div class="otp-resend-row">
          <button type="button" id="adminResendOtpBtn" class="secondary-btn" disabled>Resend OTP</button>
          <span id="adminResendTimer">Resend OTP in 60s</span>
        </div>
      </form>
      <p class="status-text" id="adminLoginStatus"></p>
    </section>

    <section class="admin-dashboard hidden" id="adminDashboard">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Realtime dashboard</p>
          <h1>Orders</h1>
        </div>
        <div class="admin-actions">
          <button type="button" id="enableSoundBtn">Enable Alerts</button>
          <button type="button" id="refreshOrdersBtn">Refresh</button>
          <button type="button" id="adminLogoutBtn">Logout</button>
        </div>
      </header>

      <section class="stats-grid">
        <article>
          <span>Total</span>
          <strong id="totalOrdersStat">0</strong>
        </article>
        <article>
          <span>Confirmed</span>
          <strong id="confirmedOrdersStat">0</strong>
        </article>
        <article>
          <span>Today</span>
          <strong id="todayOrdersStat">0</strong>
        </article>
        <article>
          <span>Revenue</span>
          <strong id="revenueStat">Rs. 0</strong>
        </article>
      </section>

      <section class="orders-toolbar">
        <input type="search" id="orderSearchInput" placeholder="Search order, customer, mobile, product">
        <select id="orderStatusFilter" class="status-select">
          <option value="">All status</option>
          <option value="Confirmed">Confirmed</option>
          <option value="Preparing">Preparing</option>
          <option value="Out for Delivery">Out for Delivery</option>
          <option value="Delivered">Delivered</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </section>

      <section id="ordersList" class="orders-list"></section>
    </section>
  </main>

  <div id="adminToast" class="admin-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./Supabase.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
