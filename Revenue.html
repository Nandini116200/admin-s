<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue | JFAM Admin</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body data-page="revenue">
  <div id="adminPageShell"></div>
  <style>
    .revenue-dashboard {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .revenue-dashboard .stats-grid {
      grid-template-columns: repeat(auto-fit, minmax(min(230px, 100%), 1fr));
    }

    .revenue-dashboard .stat-card {
      align-content: start;
      grid-template-rows: auto auto minmax(34px, 1fr) auto;
      min-width: 0;
      overflow: hidden;
    }

    .revenue-dashboard .stat-heading {
      justify-content: space-between;
      min-width: 0;
    }

    .revenue-dashboard .stat-heading > span:first-child,
    .revenue-dashboard .stat-detail,
    .revenue-dashboard .stat-trend span:last-child,
    .revenue-dashboard .stats-grid strong {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .revenue-dashboard .stats-grid strong {
      line-height: 1.08;
      max-width: 100%;
    }

    .revenue-dashboard .stat-trend {
      flex-wrap: wrap;
      height: auto;
      line-height: 1.2;
      max-width: 100%;
      min-height: 28px;
      padding-bottom: 6px;
      padding-top: 6px;
      white-space: normal;
    }

    .revenue-dashboard .stat-trend.decrease {
      background: #fff0ef;
      border-color: rgba(199, 71, 63, 0.28);
      color: #c7473f;
    }

    .revenue-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(87, 51, 26, 0.06);
      display: grid;
      gap: 16px;
      min-width: 0;
      padding: 20px;
    }

    .revenue-section-head {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .revenue-section-head h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 26px;
      line-height: 1.15;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .revenue-section-head p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
      margin: 0;
    }

    .revenue-line-frame,
    .revenue-bar-frame {
      display: grid;
      gap: 10px;
      grid-template-columns: auto minmax(0, 1fr);
      min-width: 0;
    }

    .revenue-scale {
      color: var(--muted);
      display: grid;
      font-size: 13px;
      grid-template-rows: repeat(5, 1fr);
      line-height: 1;
      padding: 8px 0 21px;
      text-align: right;
    }

    .revenue-line-chart,
    .revenue-bar-chart {
      background-image:
        linear-gradient(to top, rgba(87, 51, 26, 0.18) 1px, transparent 1px),
        linear-gradient(to right, rgba(87, 51, 26, 0.14) 1px, transparent 1px);
      background-size: 100% 25%, 16.66% 100%;
      border-bottom: 1px solid rgba(87, 51, 26, 0.42);
      border-left: 1px solid rgba(87, 51, 26, 0.42);
      min-height: 285px;
      min-width: 0;
    }

    .revenue-line-svg {
      display: block;
      height: 100%;
      min-height: 285px;
      overflow: visible;
      width: 100%;
    }

    .revenue-chart-labels {
      color: var(--muted);
      display: grid;
      font-size: 13px;
      grid-template-columns: repeat(var(--label-count, 7), 1fr);
      line-height: 1.2;
      min-width: 0;
      padding-left: 10px;
      text-align: center;
    }

    .revenue-split-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      min-width: 0;
    }

    .revenue-bar-chart {
      align-items: end;
      display: grid;
      gap: clamp(8px, 2vw, 22px);
      grid-template-columns: repeat(auto-fit, minmax(54px, 1fr));
      padding: 16px 12px 0;
    }

    .revenue-bar-cell {
      align-items: center;
      display: grid;
      gap: 8px;
      grid-template-rows: 1fr auto;
      min-width: 0;
    }

    .revenue-bar {
      align-self: end;
      background: #cf6540;
      border-radius: 8px 8px 0 0;
      min-height: 5px;
      width: 100%;
    }

    .revenue-bar-label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
      min-width: 0;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .revenue-area-list {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .revenue-area-row {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .revenue-area-top {
      align-items: baseline;
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(0, 1fr) auto;
      min-width: 0;
    }

    .revenue-area-top span,
    .revenue-area-top strong {
      overflow-wrap: anywhere;
    }

    .revenue-area-track {
      background: #f2d9ce;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }

    .revenue-area-fill {
      background: #cf6540;
      border-radius: inherit;
      display: block;
      height: 100%;
      width: var(--area-width, 0%);
    }

    .revenue-table-wrap {
      min-width: 0;
      overflow-x: auto;
    }

    .revenue-table {
      border-collapse: collapse;
      min-width: 760px;
      width: 100%;
    }

    .revenue-table th,
    .revenue-table td {
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
    }

    .revenue-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .revenue-table td {
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 980px) {
      .revenue-split-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .revenue-line-frame,
      .revenue-bar-frame {
        grid-template-columns: 1fr;
      }

      .revenue-scale {
        display: none;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./Supabase.js"></script>
  <script src="./admin-pages.js"></script>
  <script src="./revenue-page.js"></script>
</body>
</html>
