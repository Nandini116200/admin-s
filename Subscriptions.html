<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscriptions | JFAM Admin</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body data-page="subscriptions">
  <div id="adminPageShell"></div>
  <style>
    .subscriptions-dashboard {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .subscriptions-dashboard .stats-grid {
      grid-template-columns: repeat(auto-fit, minmax(min(230px, 100%), 1fr));
    }

    .subscriptions-dashboard .stat-card {
      align-content: start;
      grid-template-rows: auto auto minmax(34px, 1fr) auto;
      min-width: 0;
      overflow: hidden;
    }

    .subscriptions-dashboard .stat-heading {
      justify-content: space-between;
      min-width: 0;
    }

    .subscriptions-dashboard .stat-heading > span:first-child,
    .subscriptions-dashboard .stat-detail,
    .subscriptions-dashboard .stat-trend span:last-child,
    .subscriptions-dashboard .stats-grid strong {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .subscriptions-dashboard .stats-grid strong {
      line-height: 1.08;
      max-width: 100%;
    }

    .subscriptions-dashboard .stat-trend {
      flex-wrap: wrap;
      height: auto;
      line-height: 1.2;
      max-width: 100%;
      min-height: 28px;
      padding-bottom: 6px;
      padding-top: 6px;
      white-space: normal;
    }

    .subscriptions-dashboard .stat-trend.decrease {
      background: #fff0ef;
      border-color: rgba(199, 71, 63, 0.28);
      color: #c7473f;
    }

    .subscriptions-main-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 2fr) minmax(min(360px, 100%), 1fr);
      min-width: 0;
    }

    .subscriptions-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(87, 51, 26, 0.06);
      display: grid;
      gap: 16px;
      min-width: 0;
      padding: 20px;
    }

    .subscriptions-section-head {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .subscriptions-section-head h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 26px;
      line-height: 1.15;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .subscriptions-section-head p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
      margin: 0;
    }

    .subscriptions-bar-frame {
      display: grid;
      gap: 10px;
      grid-template-columns: auto minmax(0, 1fr);
      min-width: 0;
    }

    .subscriptions-scale {
      color: var(--muted);
      display: grid;
      font-size: 13px;
      grid-template-rows: repeat(5, 1fr);
      line-height: 1;
      padding: 8px 0 21px;
      text-align: right;
    }

    .subscriptions-bar-chart {
      align-items: end;
      background-image:
        linear-gradient(to top, rgba(87, 51, 26, 0.18) 1px, transparent 1px),
        linear-gradient(to right, rgba(87, 51, 26, 0.14) 1px, transparent 1px);
      background-size: 100% 25%, 33.33% 100%;
      border-bottom: 1px solid rgba(87, 51, 26, 0.42);
      border-left: 1px solid rgba(87, 51, 26, 0.42);
      display: grid;
      gap: clamp(12px, 4vw, 36px);
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      min-height: 285px;
      min-width: 0;
      padding: 16px 26px 0;
    }

    .subscriptions-bar-cell {
      align-items: center;
      display: grid;
      gap: 8px;
      grid-template-rows: 1fr auto;
      min-width: 0;
    }

    .subscriptions-bar {
      align-self: end;
      background: #cf6540;
      border-radius: 8px 8px 0 0;
      min-height: 5px;
      width: 100%;
    }

    .subscriptions-bar-label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
      min-width: 0;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .health-list {
      display: grid;
      gap: 14px;
    }

    .health-card {
      border-radius: 12px;
      display: grid;
      gap: 6px;
      min-width: 0;
      padding: 16px;
    }

    .health-card.good {
      background: #e7f3e7;
    }

    .health-card.warn {
      background: #fbf0df;
    }

    .health-card strong,
    .health-card span {
      overflow-wrap: anywhere;
    }

    .health-card.good strong {
      color: #2f7d48;
    }

    .health-card span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .subscriptions-table-wrap {
      min-width: 0;
      overflow-x: auto;
    }

    .subscriptions-table {
      border-collapse: collapse;
      min-width: 920px;
      width: 100%;
    }

    .subscriptions-table th,
    .subscriptions-table td {
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
    }

    .subscriptions-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .subscriptions-table td {
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 980px) {
      .subscriptions-main-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .subscriptions-bar-frame {
        grid-template-columns: 1fr;
      }

      .subscriptions-scale {
        display: none;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./Supabase.js"></script>
  <script src="./admin-pages.js"></script>
  <script src="./subscriptions-page.js"></script>
</body>
</html>
