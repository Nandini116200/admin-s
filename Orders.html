<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders Delivered | JFAM Admin</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body data-page="delivered">
  <div id="adminPageShell"></div>
  <style>
    .delivered-dashboard {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .delivered-dashboard .stats-grid {
      grid-template-columns: repeat(auto-fit, minmax(min(230px, 100%), 1fr));
    }

    .delivered-dashboard .stat-card {
      align-content: start;
      grid-template-rows: auto auto minmax(34px, 1fr) auto;
      min-width: 0;
      overflow: hidden;
    }

    .delivered-dashboard .stat-heading,
    .delivered-dashboard .stat-heading > span:last-child,
    .delivered-dashboard .stat-detail,
    .delivered-dashboard .stat-trend span:last-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .delivered-dashboard .stat-heading {
      justify-content: space-between;
    }

    .delivered-dashboard .stats-grid strong {
      line-height: 1.08;
      max-width: 100%;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .delivered-dashboard .stat-trend {
      flex-wrap: wrap;
      height: auto;
      line-height: 1.2;
      max-width: 100%;
      min-height: 28px;
      padding-bottom: 6px;
      padding-top: 6px;
      white-space: normal;
    }

    .delivered-analytics-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 2fr) minmax(min(360px, 100%), 1fr);
      min-width: 0;
    }

    .delivered-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(87, 51, 26, 0.06);
      display: grid;
      gap: 16px;
      min-width: 0;
      padding: 20px;
    }

    .delivered-section-head {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .delivered-section-head h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 26px;
      line-height: 1.15;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .delivered-section-head p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
      margin: 0;
    }

    .delivered-line-frame {
      display: grid;
      gap: 10px;
      grid-template-columns: auto minmax(0, 1fr);
      min-width: 0;
    }

    .delivered-line-scale {
      color: var(--muted);
      display: grid;
      font-size: 13px;
      grid-template-rows: repeat(5, 1fr);
      line-height: 1;
      padding: 8px 0 21px;
      text-align: right;
    }

    .delivered-line-chart {
      background-image:
        linear-gradient(to top, rgba(87, 51, 26, 0.18) 1px, transparent 1px),
        linear-gradient(to right, rgba(87, 51, 26, 0.14) 1px, transparent 1px);
      background-size: 100% 25%, 25% 100%;
      border-bottom: 1px solid rgba(87, 51, 26, 0.42);
      border-left: 1px solid rgba(87, 51, 26, 0.42);
      min-height: 285px;
      min-width: 0;
      position: relative;
    }

    .delivered-line-svg {
      display: block;
      height: 100%;
      min-height: 285px;
      overflow: visible;
      width: 100%;
    }

    .delivered-line-labels {
      color: var(--muted);
      display: grid;
      font-size: 13px;
      grid-template-columns: repeat(5, 1fr);
      line-height: 1.2;
      min-width: 0;
      padding-left: 10px;
      text-align: center;
    }

    .delivered-donut-wrap {
      align-items: center;
      display: grid;
      gap: 18px;
      justify-items: center;
      min-width: 0;
    }

    .delivered-donut {
      background: conic-gradient(#cf6540 0 var(--delivered-end), #111 var(--delivered-end) var(--out-end), #e9d7c5 var(--out-end) var(--pending-end), #f5ece3 var(--pending-end) 100%);
      border-radius: 50%;
      height: min(220px, 52vw);
      position: relative;
      width: min(220px, 52vw);
    }

    .delivered-donut::after {
      background: var(--panel);
      border-radius: 50%;
      content: "";
      inset: 31%;
      position: absolute;
    }

    .delivered-completion {
      display: grid;
      gap: 9px;
      width: 100%;
    }

    .delivered-completion-top {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      min-width: 0;
    }

    .delivered-progress-track {
      background: #f2d9ce;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }

    .delivered-progress-fill {
      background: #cf6540;
      border-radius: inherit;
      display: block;
      height: 100%;
      width: var(--completion-width, 0%);
    }

    .delivered-log-table-wrap {
      min-width: 0;
      overflow-x: auto;
    }

    .delivered-log-table {
      border-collapse: collapse;
      min-width: 840px;
      width: 100%;
    }

    .delivered-log-table th,
    .delivered-log-table td {
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
    }

    .delivered-log-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .delivered-log-table td {
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 980px) {
      .delivered-analytics-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .delivered-line-frame {
        grid-template-columns: 1fr;
      }

      .delivered-line-scale {
        display: none;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./Supabase.js"></script>
  <script src="./admin-pages.js"></script>
  <script src="./orders-page.js"></script>
</body>
</html>
